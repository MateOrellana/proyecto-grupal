<header class="navbar" [class.scrolled]="isScrolled()">
  <a class="brand" routerLink="/">
    @if (configuracion$ | async; as config) {
      @if (config.logo) {
        <span class="brand-mark">
          <img [src]="config.logo" [alt]="config.nombreEmpresa" />
        </span>
      }
      <span class="brand-text">{{ config.nombreEmpresa }}</span>
    }
  </a>

  <nav class="nav-links" aria-label="Navegacion principal">
    <a routerLink="/" fragment="inicio">Inicio</a>
    <a routerLink="/" fragment="programadores">Equipo</a>
    <a routerLink="/" fragment="servicios">Servicios</a>
    <a routerLink="/" fragment="proyectos">Proyectos</a>
    <a routerLink="/" fragment="contacto">Contacto</a>
  </nav>

  <div class="auth-actions">
    @if (currentUser$ | async; as user) {
      <a routerLink="/panel" class="text-sm font-bold text-[var(--color-muted)] hover:text-[var(--color-accent)] mr-4">Mis Solicitudes</a>
      <span class="user-email">{{ user.displayName || user.email }}</span>
      <button type="button" class="btn btn-sm btn-outline" (click)="logout()">Salir</button>
    } @else {
      <a routerLink="/login" class="btn btn-sm btn-outline">Ingresar</a>
      <a routerLink="/registro" class="btn btn-sm btn-primary">Registro</a>
    }
  </div>
</header>
