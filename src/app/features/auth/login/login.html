<section class="auth-page">
  <div class="auth-copy">
    <p class="eyebrow">Acceso</p>
    <h1>Ingresa para enviar y revisar solicitudes.</h1>
    <p>
      Los visitantes pueden explorar el portafolio sin cuenta, pero necesitan iniciar sesion
      para contactar a un programador.
    </p>
  </div>

  <div class="auth-panel">
    <div class="auth-panel-body">
      <h2>Iniciar sesion</h2>

      @if (errorMessage) {
        <div class="alert alert-error">
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
        <label class="form-control">
          <span class="label-text">Correo electronico</span>
          <input
            type="email"
            formControlName="email"
            class="input input-bordered w-full"
            placeholder="correo@ejemplo.com"
            autocomplete="email"
          />
          @if (form.controls.email.touched && form.controls.email.invalid) {
            <span class="field-error">Ingresa un correo valido.</span>
          }
        </label>

        <label class="form-control">
          <span class="label-text">Contrasena</span>
          <input
            type="password"
            formControlName="password"
            class="input input-bordered w-full"
            placeholder="Minimo 6 caracteres"
            autocomplete="current-password"
          />
          @if (form.controls.password.touched && form.controls.password.invalid) {
            <span class="field-error">La contrasena debe tener al menos 6 caracteres.</span>
          }
        </label>

        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>

      <div class="divider">o</div>

      <button type="button" class="btn btn-outline" (click)="loginWithGoogle()" [disabled]="loading">
        <span class="google-mark">G</span>
        Ingresar con Google
      </button>

      <p class="auth-link">
        No tienes cuenta?
        <a routerLink="/registro">Crear cuenta</a>
      </p>
    </div>
  </div>
</section>
